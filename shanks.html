<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البوابة الأسطورية</title>
    <style>
        /* إعدادات عامة وتصميم الخلفية الأسطورية */
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --admin-glow: #ff0055;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #050505;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* خلفية متحركة بالذكاء الاصطناعي */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: moveStars 50s linear infinite;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        /* تنسيق الأزرار الخرافي */
        .container {
            text-align: center;
            z-index: 10;
        }

        .main-btn {
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--primary-glow);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .main-btn:hover {
            box-shadow: 0 0 40px var(--primary-glow);
            transform: scale(1.05);
        }

        .admin-btn {
            display: none;
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: transparent;
            border: 2px solid var(--admin-glow);
            color: var(--admin-glow);
            border-radius: 50px;
            cursor: pointer;
            animation: fadeIn 1s ease-in;
            box-shadow: 0 0 15px var(--admin-glow);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الصفحات الداخلية */
        .page {
            display: none;
            text-align: center;
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 3rem; text-shadow: 0 0 20px var(--primary-glow); }
        .admin-tag { color: var(--admin-glow); text-shadow: 0 0 15px var(--admin-glow); }

        /* تأثيرات النيون للنصوص */
        .glow-text { animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px #fff, 0 0 20px var(--primary-glow); } to { text-shadow: 0 0 20px #fff, 0 0 30px var(--secondary-glow); } }
    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <!-- واجهة الدخول -->
    <div id="login-screen" class="container">
        <h2 class="glow-text">بوابة العبور</h2>
        <button id="entryBtn" class="main-btn" onmousedown="startTimer()" onmouseup="stopTimer()" onmouseleave="stopTimer()">دخول</button>
        <br>
        <button id="adminBtn" class="admin-btn" onclick="askPassword()">الدخول كمشرف</button>
    </div>

    <!-- صفحة المستخدم العادي -->
    <div id="user-page" class="page">
        <h1>اهلا بك</h1>
        <p>هذه الصفحة قيد الانشاء عد بعد اكتمالها</p>
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px 15px; border-radius:20px;">خروج</button>
    </div>

    <!-- صفحة المشرف -->
    <div id="admin-page" class="page">
        <h1>لوحة <span class="admin-tag">المسؤولين</span></h1>
        <p>لديك الآن كامل الصلاحيات للتحكم في النظام.</p>
        <div style="border: 2px dashed var(--admin-glow); padding: 20px; border-radius: 15px;">
            هذه الصفحة الان قيد الانشاء عد مرة اخرى بعد الاكتمال
        </div>
        <br>
        <button onclick="location.reload()" style="background:none; border:1px solid var(--admin-glow); color:var(--admin-glow); cursor:pointer; padding:5px 15px; border-radius:20px;">خروج المسؤول</button>
    </div>

    <script>
        let holdTimer;
        const entryBtn = document.getElementById('entryBtn');
        const adminBtn = document.getElementById('adminBtn');

        // وظيفة الضغط المستمر (10 ثواني)
        function startTimer() {
            holdTimer = setTimeout(() => {
                adminBtn.style.display = 'inline-block';
            }, 10000); // 10000 ميلي ثانية = 10 ثواني
        }

        function stopTimer() {
            clearTimeout(holdTimer);
        }

        // الدخول العادي
        entryBtn.onclick = function() {
            if (event.detail === 1) { // التأكد أنها ضغطة عادية وليست استمراراً
                showPage('user-page');
            }
        };

        // الدخول كمشرف بكلمة السر
        function askPassword() {
            const pass = prompt("ادخل كلمة سر المشرفين");
            if (pass === "191817333") {
                showPage('admin-page');
            } else {
                alert("كلمة سر خاطئة! حاول مجدداً.");
            }
        }

        function showPage(pageId) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById(pageId).style.display = 'block';
        }

        // إنشاء نجوم في الخلفية برمجياً
        for (let i = 0; i < 100; i++) {
            let star = document.createElement('div');
            star.className = 'stars';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 50 + 's';
            document.getElementById('bg').appendChild(star);
        }
    </script>
</body>
</html>
